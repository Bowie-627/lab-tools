<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实验室工具箱</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f6f8;--bg2:#fff;--bg3:#eef0f3;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1b1e;--muted:#6b7280;--hint:#9ca3af;
  --accent:#2563eb;
  --mono:'DM Mono',monospace;--display:'Syne',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--display);min-height:100vh;padding:2rem 1rem 4rem;}
.container{max-width:640px;margin:0 auto;}
header{margin-bottom:2.5rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);}
h1{font-size:26px;font-weight:700;margin-bottom:4px;}
.subtitle{font-family:var(--mono);font-size:12px;color:var(--hint);}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.tool-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;
           padding:20px;text-decoration:none;color:var(--text);
           transition:border-color .15s,box-shadow .15s;display:block;}
.tool-card:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,0.08);}
.tool-icon{font-size:28px;margin-bottom:12px;}
.tool-name{font-size:15px;font-weight:600;margin-bottom:4px;}
.tool-desc{font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.6;}
.ver-row{font-family:var(--mono);font-size:10px;color:var(--hint);margin-top:12px;}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>实验室工具箱</h1>
    <p class="subtitle">Lab Tools · 2026</p>
  </header>
  <div class="grid">
    <a class="tool-card" href="media.html">
      <div class="tool-icon">🧪</div>
      <div class="tool-name">培养基计算器</div>
      <div class="tool-desc">按瓶数和单瓶体积计算各培养基成分用量，支持 LB、YPD、SC 等</div>
      <div class="ver-row">v1.0 · 2026-04-28</div>
    </a>
    <a class="tool-card" href="recombination.html">
      <div class="tool-icon">🔬</div>
      <div class="tool-name">同源重组计算器</div>
      <div class="tool-desc">计算载体与片段的投入量，自动判断是否需要稀释并给出反应体系</div>
      <div class="ver-row">v1.0 · 2026-04-28</div>
    </a>
  </div>
</div>
</body>
</html>
